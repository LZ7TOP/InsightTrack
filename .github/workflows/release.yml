name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release Extension Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build & Package Extension
        run: npm run package

      - name: Check Changelog File
        id: changelog
        run: |
          if [ -f "changelogs/${{ github.ref_name }}.md" ]; then
            echo "has_changelog=true" >> $GITHUB_OUTPUT
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*.zip
          name: Release ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.has_changelog == 'true' && format('changelogs/{0}.md', github.ref_name) || '' }}
          draft: false
          prerelease: false
          generate_release_notes: ${{ steps.changelog.outputs.has_changelog != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
