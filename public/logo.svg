<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <!-- 外层极简蓝底圆角方块 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- 外层表盘圆环 -->
  <circle cx="256" cy="256" r="144" fill="none" stroke="#FFFFFF" stroke-width="28" />

  <!-- 12点钟方向刻度标志 -->
  <line x1="256" y1="124" x2="256" y2="148" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" />

  <!-- 内部柱状图兼时钟指针组合 (极简数据 + 时间概念) -->
  <!-- 左柱 (较矮) -->
  <rect x="184" y="272" width="28" height="64" rx="14" fill="#FFFFFF" opacity="0.85" />

  <!-- 中柱 (最高，兼作指针) -->
  <rect x="242" y="176" width="28" height="160" rx="14" fill="#FFFFFF" />

  <!-- 右柱 (中等) -->
  <rect x="300" y="224" width="28" height="112" rx="14" fill="#FFFFFF" opacity="0.9" />

  <!-- 焦点亮点 -->
  <circle cx="256" cy="190" r="7" fill="#FF7E40" />
</svg>
